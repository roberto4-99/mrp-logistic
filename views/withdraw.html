<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>MRP Logistic | سحب</title>

  <style>
    :root{
      --bg1:#020617; --bg2:#0b1225;
      --card: rgba(255,255,255,.07);
      --border: rgba(255,255,255,.14);
      --txt:#fff; --muted: rgba(255,255,255,.72);
      --good:#22c55e; --blue:#3b82f6; --bad:#ef4444;
      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --r24:24px; --r16:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; color:var(--txt);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:
        radial-gradient(900px 500px at 10% 10%, #15234a, transparent 60%),
        radial-gradient(900px 500px at 90% 10%, #3a0b1c, transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
      padding:16px;
      padding-bottom: calc(92px + env(safe-area-inset-bottom));
    }
    .wrap{max-width:520px;margin:0 auto}
    .toast{
      position:fixed; left:16px; right:16px;
      bottom: calc(90px + env(safe-area-inset-bottom));
      max-width:520px; margin:auto;
      background: rgba(2,6,23,.92);
      border:1px solid var(--border);
      border-radius: var(--r16);
      padding:12px 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,.28);
      display:none; z-index:9999;
      backdrop-filter: blur(14px);
    }
    .toast.show{display:block}
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; margin-top:10px;
      padding:12px 12px;
      border-radius: var(--r24);
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(12px);
      box-shadow: 0 14px 50px rgba(0,0,0,.22);
    }
    .back{
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:999px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      color:#fff; text-decoration:none; font-weight:900;
    }
    .card{
      margin-top:14px;
      background: var(--card);
      border:1px solid var(--border);
      border-radius: var(--r24);
      padding:16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    h1{margin:0; font-size:16px; font-weight:950}
    .sub{margin-top:6px; font-size:12px; color:var(--muted); line-height:1.6}
    label{display:block; margin-top:12px; font-size:12px; color:var(--muted); font-weight:900}
    .field{
      width:100%;
      margin-top:8px;
      border:none; outline:none;
      border-radius: 16px;
      padding:12px 12px;
      background: rgba(0,0,0,.32);
      border: 1px solid rgba(255,255,255,.14);
      color:#fff;
      font-size:14px;
    }
    .field:focus{
      border-color: rgba(147,197,253,.55);
      box-shadow: 0 0 0 4px rgba(59,130,246,.12);
    }
    .btn{
      width:100%;
      margin-top:14px;
      border:none; cursor:pointer;
      border-radius:999px;
      padding:12px 14px;
      font-weight:950;
      color:#fff;
      background: linear-gradient(135deg, rgba(239,68,68,.95), rgba(59,130,246,.95));
      transition:transform .12s ease, filter .2s ease;
    }
    .btn:active{transform: translateY(1px) scale(.99)}
    .mini{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
    }

    /* Bottom Nav */
    .nav{
      position: fixed; left:0; right:0; bottom:0;
      z-index:4000;
      background: rgba(2,6,23,.70);
      border-top: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(14px);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .navInner{
      max-width:1100px; margin:0 auto;
      display:flex; align-items:center; justify-content: space-around;
      gap:10px; padding: 10px 12px;
    }
    .navbtn{
      min-width: 86px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:6px;
      text-decoration:none; color:#fff;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      border-radius: 18px;
      padding: 10px 12px;
      font-weight: 950;
      user-select:none;
    }
    .navbtn small{font-size:11px;opacity:.9}
    .navbtn.active{
      background: linear-gradient(135deg, var(--good), var(--blue));
      border-color: transparent;
      color: #020617;
    }
    .navbtn.active small{opacity:1}
    .nav form{margin:0}
    .navbtn.danger{
      background: rgba(239,68,68,.18);
      border-color: rgba(239,68,68,.30);
    }
    .navbtn.danger small{color:#fff}
    .navbtn svg{width:18px;height:18px;opacity:.95}
  </style>
</head>

<body>
  <div class="toast" id="toast"></div>

  <div class="wrap">
    <div class="topbar">
      <a class="back" href="/home">← رجوع</a>
      <div style="font-weight:950; opacity:.85; font-size:12px;">صفحة السحب</div>
    </div>

    <div class="card">
      <h1>سحب</h1>
      <div class="sub" id="minLine">أقل سحب: 10$</div>

      <label>المبلغ بالدولار</label>
      <input class="field" id="amount" inputmode="decimal" placeholder="مثال: 10"/>

      <label>طريقة الدفع</label>
      <input class="field" id="method" placeholder="مثال: Inwi / CIH / CashPlus"/>

      <label>الحساب / الرقم / RIB</label>
      <input class="field" id="account" placeholder="مثال: رقم الهاتف / RIB / رقم الحساب"/>

      <button class="btn" onclick="submitWithdraw()">إرسال طلب السحب</button>

      <div class="mini">
        تأكد من طريقة الدفع والحساب قبل الإرسال يصل خلال 24 ساعة
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="nav">
    <div class="navInner">
      <a href="/home" class="navbtn" id="navHome">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M3 10.5l9-7 9 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 9.8V20a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9.8" stroke="currentColor" stroke-width="2" opacity=".85"/>
        </svg>
        <small>الرئيسية</small>
      </a>

      <a href="/tasks" class="navbtn" id="navTasks">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M9 11l2 2 4-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 4h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="2" opacity=".85"/>
        </svg>
        <small>المهام</small>
      </a>

      <a href="/profile" class="navbtn" id="navProfile">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12z" stroke="currentColor" stroke-width="2"/>
        </svg>
        <small>بروفايل</small>
      </a>

      <form method="post" action="/logout">
        <button type="submit" class="navbtn danger" style="width:100%; border:none;">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M15 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M10 12h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M18 9l3 3-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <small>خروج</small>
        </button>
      </form>
    </div>
  </div>

  <script src="/public/app.js"></script>
  <script>
    function toast(msg){
      const t=document.getElementById("toast");
      t.innerHTML=msg;
      t.classList.add("show");
      setTimeout(()=>t.classList.remove("show"),2600);
    }
    function moneyNum(v){
      const n = Number(String(v||"").replace(",", ".").trim());
      return Number.isFinite(n) ? n : NaN;
    }

    // nav highlight
    (function(){
      const p=location.pathname;
      if(p==="/home" || p==="/") document.getElementById("navHome").classList.add("active");
      if(p==="/tasks") document.getElementById("navTasks").classList.add("active");
      if(p==="/profile") document.getElementById("navProfile").classList.add("active");
    })();

    let MIN_WD = 10;

    async function loadMin(){
      try{
        const me = await api("/api/me");
        MIN_WD = Number(me.settings?.min_withdraw_usd ?? 10);
      }catch(e){}
      document.getElementById("minLine").textContent = `أقل سحب: ${MIN_WD}$`;
    }

    async function submitWithdraw(){
      const amount = moneyNum(document.getElementById("amount").value);
      const method = String(document.getElementById("method").value||"").trim();
      const account = String(document.getElementById("account").value||"").trim();

      if(!Number.isFinite(amount) || amount<=0) return toast("دخل مبلغ صحيح");
      if(amount < MIN_WD) return toast(`أقل سحب هو <b>${MIN_WD}$</b>`);
      if(!method) return toast("دخل طريقة الدفع");
      if(!account) return toast("دخل الحساب");

      // ملاحظة: السيرفر الحالي ماكيخزنش method/account فـ db.json
      // ولكن الطلب pending غادي يتسجل، والمعلومات خزنها عندك فالرسالة/المدير.
      try{
        const r = await api("/api/wallet/request","POST",{ type:"withdraw", amount_usd: amount });
        toast(r.message ? r.message : "تم إرسال طلب السحب ✅");
      }catch(e){
        return toast(e?.message || "وقع خطأ فطلب السحب");
      }

      // نقدر نرجع للهوم مباشرة
      setTimeout(()=>location.href="/home", 900);
    }

    loadMin();
  </script>
</body>
</html>
