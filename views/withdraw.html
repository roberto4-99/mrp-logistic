<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>MRP Logistic | سحب</title>

  <style>
    :root{
      --bg1:#020617; --bg2:#0b1225;
      --card: rgba(255,255,255,.07);
      --border: rgba(255,255,255,.14);
      --txt:#fff; --muted: rgba(255,255,255,.72);
      --good:#22c55e; --blue:#3b82f6; --bad:#ef4444; --amber:#f59e0b;
      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --r24:24px; --r16:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; color:var(--txt);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:
        radial-gradient(900px 500px at 10% 10%, rgba(59,130,246,.18), transparent 60%),
        radial-gradient(900px 500px at 90% 10%, rgba(239,68,68,.14), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
      padding:16px;
      padding-bottom: calc(92px + env(safe-area-inset-bottom));
    }
    .wrap{max-width:560px;margin:0 auto}

    .toast{
      position:fixed; left:16px; right:16px;
      bottom: calc(90px + env(safe-area-inset-bottom));
      max-width:560px; margin:auto;
      background: rgba(2,6,23,.92);
      border:1px solid var(--border);
      border-radius: var(--r16);
      padding:12px 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,.28);
      display:none; z-index:9999;
      backdrop-filter: blur(14px);
      line-height:1.7;
      font-weight:900;
      font-size:13px;
    }
    .toast.show{display:block}

    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; margin-top:10px;
      padding:12px 12px;
      border-radius: var(--r24);
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(12px);
      box-shadow: 0 14px 50px rgba(0,0,0,.22);
    }
    .brand{
      display:flex; align-items:center; gap:10px; min-width:0;
    }
    .logo{
      width:42px;height:42px;border-radius:16px;
      display:flex;align-items:center;justify-content:center;
      background: linear-gradient(135deg, rgba(34,197,94,.95), rgba(59,130,246,.95));
      color:#020617; font-weight:1000;
      box-shadow: var(--shadow);
      flex:0 0 auto;
    }
    .btxt{min-width:0}
    .btxt b{
      display:block; font-size:13px; font-weight:1000;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .btxt span{
      display:block; font-size:11px; color:var(--muted);
      margin-top:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width:260px;
    }

    .back{
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:999px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      color:#fff; text-decoration:none; font-weight:1000;
      white-space:nowrap;
    }

    .card{
      margin-top:14px;
      background: var(--card);
      border:1px solid var(--border);
      border-radius: var(--r24);
      padding:16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:14px;
      border-radius: var(--r24);
      background: rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
      margin-bottom:14px;
    }
    .hero b{font-size:15px; font-weight:1000}
    .hero .small{margin-top:6px; font-size:12px; color:var(--muted); line-height:1.6}
    .chip{
      display:inline-flex; align-items:center; justify-content:center;
      padding:8px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      font-weight:1000;
      font-size:12px;
      white-space:nowrap;
    }

    label{display:block; margin-top:12px; font-size:12px; color:var(--muted); font-weight:1000}
    .field{
      width:100%;
      margin-top:8px;
      border:none; outline:none;
      border-radius: 16px;
      padding:12px 12px;
      background: rgba(0,0,0,.32);
      border: 1px solid rgba(255,255,255,.14);
      color:#fff;
      font-size:14px;
    }
    .field:focus{
      border-color: rgba(147,197,253,.55);
      box-shadow: 0 0 0 4px rgba(59,130,246,.12);
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    @media(max-width:520px){ .grid{grid-template-columns:1fr} }

    .methodGrid{
      margin-top:10px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
    }
    @media(max-width:520px){ .methodGrid{grid-template-columns: repeat(2, 1fr);} }

    .mbtn{
      cursor:pointer;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color:#fff;
      padding:12px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-weight:1000;
      transition: transform .12s ease, filter .2s ease, background .2s ease;
      user-select:none;
    }
    .mbtn:active{transform: translateY(1px) scale(.99)}
    .mbtn .tag{
      width:10px;height:10px;border-radius:999px;
      background: rgba(255,255,255,.35);
      box-shadow: 0 0 0 4px rgba(255,255,255,.08);
      flex:0 0 auto;
    }
    .mbtn.active{
      background: linear-gradient(135deg, rgba(34,197,94,.25), rgba(59,130,246,.22));
      border-color: rgba(34,197,94,.35);
    }
    .mbtn.active .tag{background: var(--good); box-shadow: 0 0 0 4px rgba(34,197,94,.16);}

    .btn{
      width:100%;
      margin-top:14px;
      border:none; cursor:pointer;
      border-radius:999px;
      padding:12px 14px;
      font-weight:1000;
      color:#020617;
      background: linear-gradient(135deg, rgba(34,197,94,.98), rgba(59,130,246,.98));
      transition:transform .12s ease, filter .2s ease;
    }
    .btn:hover{filter:brightness(1.03)}
    .btn:active{transform: translateY(1px) scale(.99)}
    .btn[disabled]{opacity:.6; cursor:not-allowed}

    .mini{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.7;
    }
    .warn{
      margin-top:12px;
      padding:12px;
      border-radius: 18px;
      border:1px solid rgba(245,158,11,.25);
      background: rgba(245,158,11,.10);
      color: rgba(255,255,255,.90);
      font-size:12px;
      line-height:1.7;
      font-weight:900;
    }

    /* Bottom Nav */
    .nav{
      position: fixed; left:0; right:0; bottom:0;
      z-index:4000;
      background: rgba(2,6,23,.70);
      border-top: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(14px);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .navInner{
      max-width:1100px; margin:0 auto;
      display:flex; align-items:center; justify-content: space-around;
      gap:10px; padding: 10px 12px;
    }
    .navbtn{
      min-width: 86px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:6px;
      text-decoration:none; color:#fff;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      border-radius: 18px;
      padding: 10px 12px;
      font-weight: 1000;
      user-select:none;
    }
    .navbtn small{font-size:11px;opacity:.9}
    .navbtn.active{
      background: linear-gradient(135deg, var(--good), var(--blue));
      border-color: transparent;
      color: #020617;
    }
    .navbtn.active small{opacity:1}
    .nav form{margin:0}
    .navbtn.danger{
      background: rgba(239,68,68,.18);
      border-color: rgba(239,68,68,.30);
    }
    .navbtn.danger small{color:#fff}
    .navbtn svg{width:18px;height:18px;opacity:.95}
  </style>
</head>

<body>
  <div class="toast" id="toast"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo">MR</div>
        <div class="btxt">
          <b id="appName">MRP Logistic</b>
          <span id="userLine">—</span>
        </div>
      </div>
      <a class="back" href="/home">← رجوع</a>
    </div>

    <div class="card">
      <div class="hero">
        <div>
          <b>طلب سحب</b>
          <div class="small" id="minLine">أقل سحب: 10$</div>
        </div>
        <div class="chip" id="balanceChip">💠 الرصيد: —</div>
      </div>

      <div class="grid">
        <div>
          <label>المبلغ بالدولار</label>
          <input class="field" id="amount" inputmode="decimal" placeholder="مثال: 10"/>
        </div>
        <div>
          <label>العملة</label>
          <input class="field" value="USD" disabled/>
        </div>
      </div>

      <label>طريقة السحب (محافظ إلكترونية فقط)</label>
      <div class="methodGrid" id="methodGrid"></div>

      <label>معرّف المحفظة / Wallet ID</label>
      <input class="field" id="walletId" placeholder="مثال: Binance ID / USDT Address / Payeer Account"/>

      <button class="btn" id="sendBtn" onclick="submitWithdraw()">إرسال طلب السحب</button>

      <div class="warn">
       
      </div>

      <div class="mini">
        تأكد من المعلومات قبل الإرسال. معالجة الطلب خلال 24 ساعة.
      </div>
    </div>
  </div>


  </script>
</body>
</html>
