<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>MRP Logistic | Profile</title>

  <style>
    :root{
      --bg1:#020617;
      --bg2:#0b1225;

      --glass: rgba(255,255,255,.06);
      --glass2: rgba(255,255,255,.10);
      --border: rgba(255,255,255,.14);

      --txt:#fff;
      --muted: rgba(255,255,255,.75);
      --muted2: rgba(255,255,255,.6);

      --good:#22c55e;
      --blue:#3b82f6;
      --purple:#8b5cf6;

      --vip1:#f59e0b;
      --vip2:#f43f5e;

      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --shadow2: 0 10px 22px rgba(0,0,0,.26);

      --r24:24px;
      --r20:20px;
      --r16:16px;
    }

    /* ✅ Remove blue focus ring + tap highlight (حل الخط الأزرق) */
    *{box-sizing:border-box;-webkit-tap-highlight-color: transparent;}
    *:focus{outline:none !important;}
    *:focus-visible{outline:none !important;}
    a,button{outline:none;}
    button::-moz-focus-inner{border:0;}

    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--txt);
      background:
        radial-gradient(900px 500px at 10% 10%, #15234a, transparent 60%),
        radial-gradient(900px 500px at 90% 10%, #0b3d2a, transparent 55%),
        linear-gradient(180deg,var(--bg1),var(--bg2));

      /* ✅ مساحة للـ nav خصوصاً VIP اللي طالع لفوق */
      padding-bottom: calc(120px + env(safe-area-inset-bottom));
      overflow-x:hidden;
    }

    .wrap{
      max-width:1100px;
      margin:auto;
      padding:16px;
    }

    /* toast */
    .toast{
      position:fixed;
      left:16px;right:16px;
      bottom: calc(120px + env(safe-area-inset-bottom));
      margin:auto;
      max-width:420px;
      background:rgba(2,6,23,.92);
      border:1px solid rgba(255,255,255,.14);
      border-radius:16px;
      padding:12px 14px;
      box-shadow:var(--shadow2);
      display:none;
      z-index:5000;
      text-align:center;
      backdrop-filter: blur(14px);
      font-size:13px;
    }
    .toast.show{display:block}

    /* header */
    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px;
      border-radius:var(--r24);
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
      box-shadow:var(--shadow);
      margin-top:12px;
    }
    .back{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      color:#fff;
      text-decoration:none;
      font-weight:900;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
      user-select:none;
      cursor:pointer;
    }
    .back:hover{background: rgba(255,255,255,.12);border-color: rgba(255,255,255,.22);transform: translateY(-1px);}
    .back:active{transform: translateY(1px) scale(.99)}

    /* hero */
    .hero{
      margin-top:14px;
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:var(--r24);
      padding:18px;
      text-align:center;
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
    }
    .avatar{
      width:86px;height:86px;
      border-radius:50%;
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:1000;
      font-size:26px;
      background:linear-gradient(135deg,var(--purple),var(--blue));
      box-shadow:0 0 0 8px rgba(255,255,255,.06);
    }
    .name{
      margin:12px 0 4px;
      font-size:24px;
      font-weight:1000;
    }
    .sub{
      font-size:13px;
      color:var(--muted);
    }

    .chips{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .chip{
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      font-size:12px;
      font-weight:900;
    }

    /* stats */
    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:14px;
    }
    @media(max-width:600px){
      .stats{grid-template-columns:1fr}
    }
    .stat{
      background:var(--glass2);
      border:1px solid rgba(255,255,255,.14);
      border-radius:var(--r20);
      padding:14px;
      text-align:center;
      backdrop-filter: blur(12px);
    }
    .stat .n{
      font-size:26px;
      font-weight:1000;
    }
    .stat .t{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
    }

    /* info card */
    .info{
      margin-top:14px;
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:var(--r24);
      padding:16px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
    }
    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .row:last-child{border-bottom:none}
    .k{
      font-size:12px;
      color:var(--muted2);
      font-weight:900;
      white-space:nowrap;
    }
    .v{
      font-size:13px;
      font-weight:900;
      direction:ltr;
      text-align:left;
      max-width:60%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .copy{
      border:none;
      padding:8px 12px;
      border-radius:12px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      transition: transform .12s ease, background .2s ease, border-color .2s ease;
      user-select:none;
    }
    .copy:hover{background: rgba(255,255,255,.14);border-color: rgba(255,255,255,.24);transform: translateY(-1px);}
    .copy:active{transform: translateY(1px) scale(.99)}

    .cta{
      width:100%;
      margin-top:14px;
      border:none;
      padding:14px;
      border-radius:999px;
      font-weight:1000;
      background:linear-gradient(135deg,var(--good),var(--blue));
      color:#020617;
      cursor:pointer;
      transition: transform .12s ease, filter .2s ease;
      user-select:none;
    }
    .cta:active{transform: translateY(1px) scale(.99)}
    .cta:hover{filter: saturate(1.03);}

    /* ===============================
       ✅ Bottom Nav PRO (نفس Home)
       =============================== */
    .nav{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 4000;
      background: rgba(2,6,23,.80);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,.08);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    }

    .navInner{
      max-width:1100px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .navbtn{
      flex:1;
      min-width:64px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;

      text-decoration:none;
      background: transparent;
      border: none;
      color: rgba(255,255,255,.80);

      font-weight: 900;
      user-select:none;
      cursor:pointer;

      padding: 10px 8px;
      border-radius: 16px;
      transition: transform .12s ease, background .2s ease, color .2s ease;
    }

    .navbtn:hover{background: rgba(255,255,255,.06);transform: translateY(-1px);}
    .navbtn:active{transform: translateY(1px) scale(.99)}

    .navbtn svg{width:22px;height:22px;opacity:.95}
    .navbtn small{font-size:11px;line-height:1;opacity:.92}

    .navbtn.active{
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 10px 22px rgba(0,0,0,.18);
      color:#fff;
    }

    /* ✅ VIP وسط بارز */
    .navbtn.vip{
      flex:1.1;
      background: linear-gradient(135deg, var(--vip1), var(--vip2));
      color:#020617;
      border-radius: 18px;
      padding: 12px 10px;
      box-shadow: 0 16px 34px rgba(0,0,0,.28);
      position: relative;
      top: -10px;
    }
    .navbtn.vip svg{width:24px;height:24px}
    .navbtn.vip small{font-weight:950;opacity:1}
    .navbtn.vip.active{
      box-shadow: 0 18px 38px rgba(0,0,0,.34);
      filter: saturate(1.05);
    }

    /* Logout */
    .navbtn.danger{color: rgba(239,68,68,.95);}
    .navbtn.danger.active{background: rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.18);}

    .nav form{margin:0;flex:1;}
    .nav form button{width:100%;background:transparent;border:none;padding:0;}
    .nav form button.navbtn{padding:10px 8px;}
  </style>
</head>

<body>
<div class="toast" id="toast"></div>

<div class="wrap">
  <div class="header">
    <a href="/home" class="back">← رجوع</a>
    <div style="font-weight:900;font-size:13px;opacity:.8">الملف الشخصي</div>
  </div>

  <div class="hero">
    <div class="avatar" id="avatar">U</div>
    <div class="name" id="fullName">—</div>
    <div class="sub" id="subLine">تحميل البيانات…</div>

    <div class="chips">
      <div class="chip">🆔 <span id="uid">—</span></div>
      <div class="chip">🛡️ Active</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="n" id="points">0</div>
      <div class="t">النقاط</div>
    </div>
    <div class="stat">
      <div class="n" id="done">0</div>
      <div class="t">المهام المكتملة</div>
    </div>
    <div class="stat">
      <div class="n" id="total">0</div>
      <div class="t">كل المهام</div>
    </div>
  </div>

  <div class="info">
    <div class="row">
      <div class="k">الاسم</div>
      <div class="v" id="nameLine">—</div>
      <button class="copy" type="button" onclick="copyText('nameLine')">نسخ</button>
    </div>
    <div class="row">
      <div class="k">ID</div>
      <div class="v" id="idLine">—</div>
      <button class="copy" type="button" onclick="copyText('idLine')">نسخ</button>
    </div>
    <div class="row">
      <div class="k">النقاط</div>
      <div class="v"><span id="pointsLine">0</span> pts</div>
      <button class="copy" type="button" onclick="copyText('pointsLine')">نسخ</button>
    </div>

    <button class="cta" type="button" onclick="location.href='/tasks'">الذهاب للمهام</button>
  </div>
</div>

<!-- Bottom Navigation (PRO + VIP) -->
<div class="nav">
  <div class="navInner">
    <a href="/home" class="navbtn" id="navHome" aria-label="الرئيسية">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 10.5l9-7 9 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 9.8V20a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9.8" stroke="currentColor" stroke-width="2" opacity=".85" stroke-linecap="round"/>
      </svg>
      <small>الرئيسية</small>
    </a>

    <a href="/tasks" class="navbtn" id="navTasks" aria-label="المهام">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M9 11l2 2 4-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7 4h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="2" opacity=".85"/>
      </svg>
      <small>المهام</small>
    </a>

    <a href="/vip" class="navbtn vip" id="navVip" aria-label="VIP" title="VIP">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 3l2.3 6.8H21l-5.6 4 2.2 6.8L12 16.9 6.4 20.6l2.2-6.8L3 9.8h6.7L12 3z"
              stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>
      <small>VIP</small>
    </a>

    <a href="/profile" class="navbtn" id="navProfile" aria-label="بروفايل">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12z" stroke="currentColor" stroke-width="2"/>
      </svg>
      <small>بروفايل</small>
    </a>

    <form method="post" action="/logout">
      <button class="navbtn danger" type="submit" aria-label="خروج" id="navLogout">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M15 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M10 12h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M18 9l3 3-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <small>خروج</small>
      </button>
    </form>
  </div>
</div>

<script src="/public/app.js"></script>
<script>
  function toast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),2600);
  }

  function initials(name){
    const s=(name||"").trim();
    if(!s) return "U";
    const p=s.split(/\s+/);
    return ((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase();
  }

  function copyText(id){
    const el = document.getElementById(id);
    const v = (el?.textContent || "").trim();
    if(!v){ toast("لا يوجد شيء للنسخ"); return; }
    navigator.clipboard?.writeText(v);
    toast("تم النسخ ✅");
  }

  /* ✅ Active nav: Home/Tasks/Profile/VIP */
  (function setActiveNav(){
    const p = (location.pathname || "/").toLowerCase();
    const home = document.getElementById("navHome");
    const tasks = document.getElementById("navTasks");
    const profile = document.getElementById("navProfile");
    const vip = document.getElementById("navVip");

    home?.classList.remove("active");
    tasks?.classList.remove("active");
    profile?.classList.remove("active");
    vip?.classList.remove("active");

    if(p === "/" || p === "/home") home?.classList.add("active");
    else if(p === "/tasks" || p.startsWith("/tasks/")) tasks?.classList.add("active");
    else if(p === "/profile" || p.startsWith("/profile/")) profile?.classList.add("active");
    else if(p === "/vip" || p.startsWith("/vip/")) vip?.classList.add("active");
  })();

  async function load(){
    try{
      const me = await api("/api/me");
      const full = me.user?.full_name || "User";
      const id = String(me.user?.id || "—");

      document.getElementById("fullName").textContent = full;
      document.getElementById("avatar").textContent = initials(full);
      document.getElementById("uid").textContent = id;

      const pts = me.user?.points_balance ?? 0;
      document.getElementById("points").textContent = pts;
      document.getElementById("done").textContent = me.tasks?.done ?? 0;
      document.getElementById("total").textContent = me.tasks?.total ?? 0;

      document.getElementById("nameLine").textContent = full;
      document.getElementById("idLine").textContent = id;
      document.getElementById("pointsLine").textContent = pts;

      document.getElementById("subLine").textContent = "إدارة الحساب + الإحصائيات الشخصية";
    }catch(e){
      toast("تعذر تحميل البيانات");
      document.getElementById("subLine").textContent = "تعذر تحميل البيانات";
    }
  }

  load();
</script>
</body>
</html>
