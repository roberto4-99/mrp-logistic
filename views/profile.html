<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>MRP Logistic | Profile</title>

  <style>
    :root{
      --bg1:#020617;
      --bg2:#0b1225;
      --glass: rgba(255,255,255,.06);
      --glass2: rgba(255,255,255,.10);
      --border: rgba(255,255,255,.14);
      --txt:#fff;
      --muted: rgba(255,255,255,.75);
      --muted2: rgba(255,255,255,.6);
      --good:#22c55e;
      --blue:#3b82f6;
      --purple:#8b5cf6;
      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --r24:24px;
      --r20:20px;
      --r16:16px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--txt);
      background:
        radial-gradient(800px 400px at 15% 10%, rgba(99,102,241,.25), transparent 55%),
        radial-gradient(800px 400px at 85% 15%, rgba(59,130,246,.20), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      padding-bottom: calc(92px + env(safe-area-inset-bottom));
    }

    .wrap{
      max-width:1100px;
      margin:auto;
      padding:16px;
    }

    /* toast */
    .toast{
      position:fixed;
      left:16px;right:16px;
      bottom: calc(90px + env(safe-area-inset-bottom));
      margin:auto;
      max-width:420px;
      background:rgba(2,6,23,.92);
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px 14px;
      box-shadow:var(--shadow);
      display:none;
      z-index:5000;
      text-align:center;
      backdrop-filter: blur(14px);
    }
    .toast.show{display:block}

    /* header */
    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px;
      border-radius:var(--r24);
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
      box-shadow:var(--shadow);
      margin-top:12px;
    }
    .back{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      color:#fff;
      text-decoration:none;
      font-weight:900;
    }

    /* hero */
    .hero{
      margin-top:14px;
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:var(--r24);
      padding:18px;
      text-align:center;
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
    }
    .avatar{
      width:86px;height:86px;
      border-radius:50%;
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:1000;
      font-size:26px;
      background:linear-gradient(135deg,var(--purple),var(--blue));
      box-shadow:0 0 0 8px rgba(255,255,255,.06);
    }
    .name{
      margin:12px 0 4px;
      font-size:24px;
      font-weight:1000;
    }
    .sub{
      font-size:13px;
      color:var(--muted);
    }

    .chips{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .chip{
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      font-size:12px;
      font-weight:900;
    }

    /* stats */
    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:14px;
    }
    @media(max-width:600px){
      .stats{grid-template-columns:1fr}
    }
    .stat{
      background:var(--glass2);
      border:1px solid rgba(255,255,255,.14);
      border-radius:var(--r20);
      padding:14px;
      text-align:center;
    }
    .stat .n{
      font-size:26px;
      font-weight:1000;
    }
    .stat .t{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
    }

    /* info card */
    .info{
      margin-top:14px;
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:var(--r24);
      padding:16px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
    }
    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .row:last-child{border-bottom:none}
    .k{
      font-size:12px;
      color:var(--muted2);
      font-weight:900;
      white-space:nowrap;
    }
    .v{
      font-size:13px;
      font-weight:900;
      direction:ltr;
      text-align:left;
      max-width:60%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .copy{
      border:none;
      padding:8px 12px;
      border-radius:12px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18);
      color:#fff;
      font-weight:900;
      cursor:pointer;
    }

    .cta{
      width:100%;
      margin-top:14px;
      border:none;
      padding:14px;
      border-radius:999px;
      font-weight:1000;
      background:linear-gradient(135deg,var(--good),var(--blue));
      color:#020617;
      cursor:pointer;
    }

    /* ===============================
       MOBILE STYLE BOTTOM NAV (PRO)
       =============================== */
    .nav{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 4000;

      background: rgba(2,6,23,.72);
      border-top: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(16px);

      padding-bottom: env(safe-area-inset-bottom);
    }

    .navInner{
      max-width:1100px;
      margin:0 auto;

      display:flex;
      justify-content: space-around;
      align-items:center;

      padding: 10px 8px calc(12px + env(safe-area-inset-bottom));
      gap: 6px;
    }

    .navbtn{
      flex: 1;
      min-width: 70px;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap: 6px;

      text-decoration:none;
      background: transparent;
      border: none;
      color: rgba(255,255,255,.72);

      font-weight: 850;
      user-select:none;

      padding: 8px 6px;
      border-radius: 16px;
      transition: transform .12s ease, background .2s ease, color .2s ease;
      cursor:pointer;
    }

    .navbtn:hover{ background: rgba(255,255,255,.06); }
    .navbtn:active{ transform: translateY(1px) scale(.99); }

    .navbtn svg{
      width: 22px;
      height: 22px;
      stroke-width: 2;
      color: rgba(255,255,255,.70);
      opacity: .95;
    }

    .navbtn small{
      font-size: 11px;
      color: rgba(255,255,255,.70);
      line-height: 1;
    }

    .navbtn.active{
      background: linear-gradient(135deg, var(--good), var(--blue));
      color: #020617;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
    }
    .navbtn.active svg{ color:#020617; }
    .navbtn.active small{ color:#020617; font-weight:950; }

    .navbtn.danger{
      background: rgba(239,68,68,.12);
    }
    .navbtn.danger svg,
    .navbtn.danger small{ color:#ef4444; }
    .navbtn.danger:hover{ background: rgba(239,68,68,.18); }

    .nav form{margin:0;flex:1}
    .nav form .navbtn{ width:100%; }
  </style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="wrap">
  <div class="header">
    <a href="/home" class="back">← رجوع</a>
    <div style="font-weight:900;font-size:13px;opacity:.8">الملف الشخصي</div>
  </div>

  <div class="hero">
    <div class="avatar" id="avatar">U</div>
    <div class="name" id="fullName">—</div>
    <div class="sub" id="subLine">تحميل البيانات…</div>

    <div class="chips">
      <div class="chip">🆔 <span id="uid">—</span></div>
      <div class="chip">🛡️ Active</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="n" id="points">0</div>
      <div class="t">النقاط</div>
    </div>
    <div class="stat">
      <div class="n" id="done">0</div>
      <div class="t">المهام المكتملة</div>
    </div>
    <div class="stat">
      <div class="n" id="total">0</div>
      <div class="t">كل المهام</div>
    </div>
  </div>

  <div class="info">
    <div class="row">
      <div class="k">الاسم</div>
      <div class="v" id="nameLine">—</div>
      <button class="copy" onclick="copyText('nameLine')">نسخ</button>
    </div>
    <div class="row">
      <div class="k">ID</div>
      <div class="v" id="idLine">—</div>
      <button class="copy" onclick="copyText('idLine')">نسخ</button>
    </div>
    <div class="row">
      <div class="k">النقاط</div>
      <div class="v"><span id="pointsLine">0</span> pts</div>
      <button class="copy" onclick="copyText('pointsLine')">نسخ</button>
    </div>

    <button class="cta" onclick="location.href='/tasks'">الذهاب للمهام</button>
  </div>
</div>

<!-- bottom nav (SVG + نفس السميات) -->
<div class="nav">
  <div class="navInner">
    <a href="/home" class="navbtn" id="navHome" aria-label="الرئيسية">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 10.5l9-7 9 7" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 9.8V20a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9.8" stroke="currentColor" opacity=".85" stroke-linecap="round"/>
      </svg>
      <small>الرئيسية</small>
    </a>

    <a href="/tasks" class="navbtn" id="navTasks" aria-label="المهام">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M9 11l2 2 4-5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7 4h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" stroke="currentColor" opacity=".85"/>
      </svg>
      <small>المهام</small>
    </a>

    <a href="/profile" class="navbtn" id="navProfile" aria-label="بروفايل">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-linecap="round"/>
        <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12z" stroke="currentColor"/>
      </svg>
      <small>بروفايل</small>
    </a>

    <form method="post" action="/logout">
      <button class="navbtn danger" type="submit" aria-label="خروج">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M15 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8" stroke="currentColor" stroke-linecap="round"/>
          <path d="M10 12h11" stroke="currentColor" stroke-linecap="round"/>
          <path d="M18 9l3 3-3 3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <small>خروج</small>
      </button>
    </form>
  </div>
</div>

<script src="/public/app.js"></script>
<script>
  function toast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),2600);
  }

  function initials(name){
    const s=(name||"").trim();
    if(!s) return "U";
    const p=s.split(/\s+/);
    return ((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase();
  }

  function copyText(id){
    const v=document.getElementById(id)?.textContent||"";
    if(!v){toast("لا يوجد شيء للنسخ");return;}
    navigator.clipboard?.writeText(v);
    toast("تم النسخ ✅");
  }

  /* ✅ Active كيخدم حتى /profile/ و /tasks/... */
  (function setActiveNav(){
    const p = location.pathname || "/";
    const home = document.getElementById("navHome");
    const tasks = document.getElementById("navTasks");
    const profile = document.getElementById("navProfile");
    if(!home || !tasks || !profile) return;

    if(p === "/" || p === "/home") home.classList.add("active");
    else if(p === "/tasks" || p.startsWith("/tasks/")) tasks.classList.add("active");
    else if(p === "/profile" || p.startsWith("/profile/")) profile.classList.add("active");
  })();

  async function load(){
    try{
      const me = await api("/api/me");
      const full = me.user?.full_name || "User";
      const id = String(me.user?.id || "—");

      document.getElementById("fullName").textContent = full;
      document.getElementById("avatar").textContent = initials(full);
      document.getElementById("uid").textContent = id;

      const pts = me.user?.points_balance ?? 0;
      document.getElementById("points").textContent = pts;
      document.getElementById("done").textContent = me.tasks?.done ?? 0;
      document.getElementById("total").textContent = me.tasks?.total ?? 0;

      document.getElementById("nameLine").textContent = full;
      document.getElementById("idLine").textContent = id;
      document.getElementById("pointsLine").textContent = pts;

      document.getElementById("subLine").textContent = "إدارة الحساب + الإحصائيات الشخصية";
    }catch(e){
      toast("تعذر تحميل البيانات");
      document.getElementById("subLine").textContent = "تعذر تحميل البيانات";
    }
  }

  load();
</script>
</body>
</html>
